name: Lighthouse Audit

on: [pull_request]
jobs:
    audit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Vercel Action
              id: vercel_action
              uses: amondnet/vercel-action@v20
              with:
                  vercel-token: ${{ secrets.VERCEL_TOKEN }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  vercel-org-id: ${{ secrets.VERCEL_ORG_ID}}
                  vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID}}
                  # comment this out if not using vercel teams
                  # scope: ${{ secrets.VERCEL_SCOPE }}
            - name: Add comment to PR
              id: loading_lighthouse_comment_to_pr
              uses: marocchino/sticky-pull-request-comment@v2
              with:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  number: ${{ github.event.pull_request.number }}
                  header: lighthouse
                  message: |
                      🚦 Running Lighthouse audit...
            # - name: Add comment to PR
            #   id: loading_budget_comment_to_pr
            #   uses: marocchino/sticky-pull-request-comment@v2
            #   with:
            #       GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            #       number: ${{ github.event.pull_request.number }}
            #       header: budget
            #       message: |
            #           ⏱ Running budget checks...
            - name: Audit URLs using Lighthouse
              id: lighthouse_audit
              # A flaky 403 from Vercel's edge shouldn't red-X the PR; the
              # report step runs with `if: always()` and degrades gracefully.
              continue-on-error: true
              uses: treosh/lighthouse-ci-action@v9
              with:
                  # add as many urls here as you wish to audit
                  # prefixed by the preview-url
                  urls: |
                      ${{ steps.vercel_action.outputs.preview-url }}
                  # budgetPath: '.github/lighthouse/budget.json'
                  uploadArtifacts: true
                  temporaryPublicStorage: true
                  # Single run: 3 rapid hits on one deployment tripped Vercel's
                  # bot mitigation (403). One pass is plenty for an informational audit.
                  runs: 1
            - name: Format Lighthouse result
              id: lighthouse_result
              if: ${{ always() }}
              uses: actions/github-script@v7
              env:
                  # Pass through env (not raw interpolation) so empty outputs from a
                  # failed audit can't inject invalid JS into the script body.
                  LIGHTHOUSE_LINKS: ${{ steps.lighthouse_audit.outputs.links }}
                  LIGHTHOUSE_MANIFEST: ${{ steps.lighthouse_audit.outputs.manifest }}
              with:
                  github-token: ${{secrets.GITHUB_TOKEN}}
                  script: |
                      const links = JSON.parse(process.env.LIGHTHOUSE_LINKS || '{}');
                      const manifest = JSON.parse(process.env.LIGHTHOUSE_MANIFEST || '[]');
                      const results = manifest.filter(result => result.isRepresentativeRun);

                      if (!results.length) {
                        core.setOutput(
                          "comment",
                          "🚦 Lighthouse audit didn’t complete — the preview URL couldn’t be loaded. See the workflow logs for details."
                        );
                        return;
                      }

                      const score = res => res >= 90 ? '🟢' : res >= 50 ? '🟠' : '🔴';

                      const comment = results.map((result) => {
                        const summary = result.summary;
                        const url = result.url;

                        return `
                        🌎 [${url}](${url})
                        ⚡️ [Lighthouse report](${links[url]})

                        | Category | Score |
                        | --- | --- |
                        ${Object.keys(summary).map((key) => {
                          const percentage = Math.round(summary[key] * 100);
                          return `| ${score(percentage)} ${key} | ${percentage} |`;
                        }).join('\n')}

                        `;
                      }).join('---');

                      core.setOutput("comment", comment);
            # - name: Format budget result
            #   id: budget_result
            #   if: ${{ always() }}
            #   uses: actions/github-script@v4
            #   with:
            #       github-token: ${{secrets.GITHUB_TOKEN}}
            #       script: |
            #           const assertions = ${{ steps.lighthouse_audit.outputs.assertionResults }};
            #           if (!assertions.length) {
            #             core.setOutput("comment", '✅ Budget met, nothing to see here');
            #           } else {
            #             const comment = assertions.map((result) => {
            #               return `
            #           ❌ **${result.auditProperty || ''}.${result.auditId}** failure on [${result.url}](${result.url})

            #           *${result.auditTitle}* - [docs](${result.auditDocumentationLink})

            #           | Actual | Expected |
            #           | --- | --- |
            #           | ${result.actual} | ${result.operator} ${result.expected} |
            #           `;
            #             }).join('---');

            #             core.setOutput("comment", comment);
            #           }
            - name: Add Lighthouse comment to PR
              id: lighthouse_comment_to_pr
              if: ${{ always() }}
              uses: marocchino/sticky-pull-request-comment@v2
              with:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  number: ${{ github.event.pull_request.number }}
                  header: lighthouse
                  message: |
                      ${{ steps.lighthouse_result.outputs.comment }}
            # - name: Add Budget comment to PR
            #   id: budget_comment_to_pr
            #   if: ${{ always() }}
            #   uses: marocchino/sticky-pull-request-comment@v1
            #   with:
            #       GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            #       number: ${{ github.event.pull_request.number }}
            #       header: budget
            #       message: |
            #           ${{ steps.budget_result.outputs.comment }}